<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Enhancer</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 520px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.35);
            color: white;
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        p {
            text-align: center;
            color: #cbd5e1;
            margin-bottom: 35px;
            font-size: 0.95rem;
        }

        .upload-box {
            border: 2px dashed rgba(255,255,255,0.25);
            border-radius: 18px;
            padding: 45px 20px;
            text-align: center;
            transition: 0.3s ease;
            margin-bottom: 30px;
        }

        .upload-box:hover {
            border-color: #60a5fa;
            background: rgba(255,255,255,0.04);
        }

        .upload-box label {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 14px 26px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .upload-box label:hover {
            background: #3b82f6;
            transform: translateY(-2px);
        }

        input[type="file"] {
            display: none;
        }

        .file-name {
            margin-top: 18px;
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(59,130,246,0.35);
        }

        button:active {
            transform: scale(0.98);
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 24px;
            }

            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>✨ Image Enhancer</h1>
        <p>Upload your image below and enhance it with AI.</p>

        <form action="#" method="POST" enctype="multipart/form-data">

            <div class="upload-box">
                <label for="imageUpload">
                    📁 Choose Image
                </label>

                <input
                    type="file"
                    id="imageUpload"
                    name="image"
                    accept="image/*"
                    required
                >

                <div class="file-name" id="fileName">
                    No image selected
                </div>
            </div>

            <button type="submit">
                Enhance Image
            </button>

        </form>
    </div>

    <script>
        const upload = document.getElementById("imageUpload");
        const fileName = document.getElementById("fileName");

        upload.addEventListener("change", function () {
            if (this.files.length > 0) {
                fileName.textContent = this.files[0].name;
            } else {
                fileName.textContent = "No image selected";
            }
        });
    </script>

</body>
</html>
